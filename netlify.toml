[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://googleads.g.doubleclick.net https://www.googletagmanager.com https://region1.google-analytics.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# ── API → Netlify Functions ────────────────────────────────
[[redirects]]
  from = "/api/waitlist"
  to = "/.netlify/functions/waitlist"
  status = 200

[[redirects]]
  from = "/api/google-ads/campaign"
  to = "/.netlify/functions/google-ads-campaign"
  status = 200

[[redirects]]
  from = "/api/google-ads/conversions"
  to = "/.netlify/functions/google-ads-conversions"
  status = 200

[[redirects]]
  from = "/api/google-ads/report"
  to = "/.netlify/functions/google-ads-report"
  status = 200

[[redirects]]
  from = "/api/google-ads/weekly-review"
  to = "/.netlify/functions/google-ads-weekly-review"
  status = 200

[[redirects]]
  from = "/api/google-ads/checkin"
  to = "/.netlify/functions/google-ads-checkin"
  status = 200

[[redirects]]
  from = "/api/morning-briefing"
  to = "/.netlify/functions/morning-briefing"
  status = 200

# ── Redirects ──────────────────────────────────────────────
# Removed pages
[[redirects]]
  from = "/updates"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/updates/"
  to = "/blog/"
  status = 301

# Old blog post → new URL (matching content imported)
[[redirects]]
  from = "/blog/whos-really-at-your-door-hidden-risk-letting-strangers-into-home"
  to = "/blog/whos-really-at-your-door/"
  status = 301

# Catch-all: old pre-pivot blog slugs → blog index
[[redirects]]
  from = "/blog/*"
  to = "/blog/"
  status = 301
